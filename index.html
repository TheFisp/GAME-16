<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Space Maze XL - Chrono Rift</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; color: white; 
            font-family: 'Courier New', Courier, monospace;
        }
        #main-wrapper { 
            display: flex; justify-content: center; align-items: center; 
            width: 100vw; height: 100vh; transition: transform 0.6s ease, filter 0.3s ease; 
        }
        
        /* Effetto inversione colori per lo squarcio */
        .color-invert { filter: invert(1) hue-rotate(180deg); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(15px); background: rgba(0,0,0,0.85); z-index: 100; text-align: center;
        }

        #win-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(30px);
            z-index: 200; flex-direction: column; justify-content: center; align-items: center;
        }
        .win-text {
            font-size: 9rem; font-weight: 900; color: #00ff41;
            animation: oscillate 2s infinite ease-in-out;
            text-shadow: 0 0 40px #00ff41, 0 0 80px #00ff41;
            z-index: 210;
        }
        @keyframes oscillate {
            0%, 100% { transform: translateX(-40px) rotate(-3deg); }
            50% { transform: translateX(40px) rotate(3deg); }
        }
        .clue-text { font-size: 2.2rem; margin-top: 50px; color: #00ffff; text-shadow: 0 0 10px cyan; z-index: 210; }

        button {
            padding: 20px 60px; font-size: 1.8rem; background: #00ff41; border: none;
            color: black; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #00ff41; margin-top: 25px;
        }
        canvas { background: #000; border: 3px solid #444; display: block; }
        
        .alert-banner {
            position: fixed; top: 10%; width: 100%; text-align: center;
            font-size: 4.5rem; font-weight: 900; display: none; z-index: 150;
            animation: blink 0.4s infinite;
        }
        #alert-asteroids { color: #ff1a1a; text-shadow: 0 0 25px red; }
        #alert-rift { color: #00ffff; text-shadow: 0 0 25px cyan; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .shake-heavy { animation: shakeAnim 0.1s infinite; }
        @keyframes shakeAnim { 0% { transform: translate(6px, 6px); } 50% { transform: translate(-6px, -6px); } }
        .flash-red { animation: flashBG 2s infinite ease-in-out; }
        @keyframes flashBG { 0%, 100% { background: #000; } 50% { background: #400; } }
    </style>
</head>
<body>

<div id="alert-asteroids" class="alert-banner">ALLERTA ASTEROIDI</div>
<div id="alert-rift" class="alert-banner">ALLERTA SQUARCIO TEMPORALE</div>

<div id="win-screen">
    <div class="win-text">HAI VINTO</div>
    <div class="clue-text">Il tuo indizio: Casa è lontana, ma la famiglia è vicina</div>
    <canvas id="confetti-canvas" style="position:absolute; top:0; left:0; pointer-events:none;"></canvas>
</div>

<audio id="bgMusic" loop><source src="https://raw.githubusercontent.com/TheFisp/GAME-16/main/YTDown.com_YouTube_Spore-Soundtrack-A-Million-Or-So-Nebula_Media_gniK6EF9EJM_007_128k.mp3" type="audio/mpeg"></audio>
<audio id="sirenSound" loop><source src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3" type="audio/mpeg"></audio>

<div id="msg-overlay" class="overlay">
    <h1 id="msg-title" style="font-size: 3.5rem; letter-spacing: 5px;">INIZIA</h1>
    <p id="msg-desc">Continua a muoverti.</p>
    <button onclick="handleButtonClick()">DECOLLO</button>
</div>

<div id="main-wrapper">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('msg-overlay');
    const winScreen = document.getElementById('win-screen');
    const alertAst = document.getElementById('alert-asteroids');
    const alertRift = document.getElementById('alert-rift');
    const wrapper = document.getElementById('main-wrapper');
    const bgMusic = document.getElementById('bgMusic');
    const siren = document.getElementById('sirenSound');

    let cellSize = 48, cols = 35, rows = 20;
    let currentLevel = 1, maze = [], path = [{x: 0, y: 0}];
    let isDragging = false, keysRequired = 0, keysFound = 0;
    let stars = [];
    let eventActive = false; // Impedisce sovrapposizione allerta
    
    const TP_COOLDOWN = 5500; 
    let lastTeleportTime = Date.now();

    function initStars() {
        stars = [];
        for(let i=0; i<100; i++) stars.push({ x: Math.random()*2000, y: Math.random()*1500, s: Math.random()*2, o: Math.random() });
    }

    function generateMaze() {
        keysFound = 0; eventActive = false;
        if (currentLevel === 7) { cols = 45; rows = 25; cellSize = 38; }
        else { cols = 35; rows = 20; cellSize = 48; }
        canvas.width = cols * cellSize; canvas.height = rows * cellSize;
        initStars();

        const reqs = [0, 0, 0, 1, 2, 2, 3, 3];
        keysRequired = reqs[currentLevel];
        maze = Array.from({length: rows}, () => Array(cols).fill(0));
        
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if ((x<2 && y<2) || (x>cols-3 && y>rows-3)) continue;
                let r = Math.random();
                if (currentLevel === 1) { if(r > 0.85) maze[y][x] = 1; }
                else if (currentLevel === 2) { if(r > 0.95) maze[y][x] = 2; else if(r > 0.85) maze[y][x] = 1; }
                else if (currentLevel === 3) { if(r > 0.85) maze[y][x] = 1; }
                else if (currentLevel === 4) { if(r > 0.93) maze[y][x] = 2; else if(r > 0.85) maze[y][x] = 1; }
                else if (currentLevel === 5) { if(r > 0.95) maze[y][x] = 4; else if(r > 0.85) maze[y][x] = 1; }
                else if (currentLevel >= 6) { if(r > 0.96) maze[y][x] = 4; else if(r > 0.92) maze[y][x] = 2; else if(r > 0.85) maze[y][x] = 1; }
            }
        }
        for (let i = 0; i < keysRequired; i++) {
            let rx, ry;
            do { rx = Math.floor(Math.random()*(cols-4))+2; ry = Math.floor(Math.random()*(rows-4))+2; } while (maze[ry][rx] !== 0);
            maze[ry][rx] = 3;
        }
        if (!isSolvable()) generateMaze();
        lastTeleportTime = Date.now();
    }

    function isSolvable() {
        let v = Array.from({length: rows}, () => Array(cols).fill(false));
        let q = [{x: 0, y: 0}]; v[0][0] = true;
        while(q.length > 0) {
            let {x, y} = q.shift();
            if(x === cols-1 && y === rows-1) return true;
            [[0,1],[1,0],[0,-1],[-1,0]].forEach(([dx, dy]) => {
                let nx = x+dx, ny = y+dy;
                if(nx>=0 && nx<cols && ny>=0 && ny<rows && maze[ny][nx] !== 1 && maze[ny][nx] !== 2 && maze[ny][nx] !== 4 && !v[ny][nx]) {
                    v[ny][nx] = true; q.push({x: nx, y: ny});
                }
            });
        }
        return false;
    }

    function flipMaze() {
        wrapper.classList.add('color-invert');
        setTimeout(() => wrapper.classList.remove('color-invert'), 500);

        const horizontal = Math.random() > 0.5;
        const newMaze = Array.from({length: rows}, () => Array(cols).fill(0));
        
        for(let y=0; y<rows; y++) {
            for(let x=0; x<cols; x++) {
                let nx = horizontal ? (cols - 1 - x) : x;
                let ny = horizontal ? y : (rows - 1 - y);
                newMaze[ny][nx] = maze[y][x];
            }
        }
        maze = newMaze;
        path = path.map(p => ({
            x: horizontal ? (cols - 1 - p.x) : p.x,
            y: horizontal ? p.y : (rows - 1 - p.y)
        }));
        isDragging = false;
    }

    function draw() {
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white"; stars.forEach(s => { ctx.globalAlpha = s.o; ctx.fillRect(s.x, s.y, s.s, s.s); }); ctx.globalAlpha = 1;

        const now = Date.now(); const elapsed = now - lastTeleportTime; const tpRatio = Math.min(elapsed / TP_COOLDOWN, 1);

        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                let px = x * cellSize, py = y * cellSize;
                if (maze[y][x] === 1) { ctx.fillStyle = "#1e1e3f"; ctx.fillRect(px+2, py+2, cellSize-4, cellSize-4); }
                else if (maze[y][x] === 2) { ctx.fillStyle = "#f00"; ctx.beginPath(); ctx.arc(px+cellSize/2, py+cellSize/2, cellSize/3, 0, Math.PI*2); ctx.fill(); }
                else if (maze[y][x] === 3) { ctx.fillStyle = "#ffd700"; ctx.shadowBlur = 15; ctx.shadowColor = "yellow"; ctx.fillRect(px+12, py+12, cellSize-24, cellSize-24); ctx.shadowBlur = 0; }
                else if (maze[y][x] === 4) {
                    let shake = elapsed > 1500 ? Math.pow((elapsed-1500)/4000, 2) * 18 : 0;
                    let ox = (Math.random()-0.5)*shake, oy = (Math.random()-0.5)*shake;
                    ctx.fillStyle = "#a0f"; ctx.beginPath(); ctx.arc(px+cellSize/2+ox, py+cellSize/2+oy, cellSize/3, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = "white"; ctx.lineWidth = tpRatio * 14; ctx.beginPath(); ctx.arc(px+cellSize/2, py+cellSize/2, cellSize/3-ctx.lineWidth/2, 0, Math.PI*2); ctx.stroke();
                }
            }
        }

        ctx.strokeStyle = (keysFound >= keysRequired) ? "#0f4" : "#444"; ctx.lineWidth = 4; ctx.strokeRect((cols-1)*cellSize+6, (rows-1)*cellSize+6, cellSize-12, cellSize-12);
        
        // Path
        ctx.beginPath(); ctx.lineWidth = 8; ctx.strokeStyle = "#0f4"; ctx.lineJoin = "round";
        if(path.length > 0) {
            ctx.moveTo(path[0].x * cellSize + cellSize/2, path[0].y * cellSize + cellSize/2);
            path.forEach(p => ctx.lineTo(p.x * cellSize + cellSize/2, p.y * cellSize + cellSize/2));
            ctx.stroke();
        }

        // Alieno - SEMPRE SOPRA
        ctx.font = "32px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("👽", path[0].x * cellSize + cellSize/2, path[0].y * cellSize + cellSize/2);

        const last = path[path.length - 1];
        if(last) {
            ctx.beginPath(); ctx.arc(last.x * cellSize + cellSize/2, last.y * cellSize + cellSize/2, 12, 0, Math.PI*2);
            ctx.fillStyle = "#fff"; ctx.fill(); ctx.stroke();
        }

        if (elapsed >= TP_COOLDOWN) { teleportObstacles(); lastTeleportTime = Date.now(); }
        requestAnimationFrame(draw);
    }

    function teleportObstacles() {
        for(let y=0; y<rows; y++) {
            for(let x=0; x<cols; x++) {
                if(maze[y][x] === 4) {
                    maze[y][x] = 0; let rx, ry;
                    do { rx = Math.floor(Math.random()*cols); ry = Math.floor(Math.random()*rows); } while (maze[ry][rx] !== 0 || path.some(p => p.x === rx && p.y === ry));
                    maze[ry][rx] = 4;
                }
            }
        }
    }

    function triggerAsteroids() {
        if(eventActive) return;
        eventActive = true;
        alertAst.style.display = 'block'; wrapper.classList.add('shake-heavy'); document.body.classList.add('flash-red'); siren.play();
        setTimeout(() => { 
            alertAst.style.display = 'none'; wrapper.classList.remove('shake-heavy'); document.body.classList.remove('flash-red'); siren.pause(); 
            eventActive = false;
        }, 5000);
    }

    function triggerRift() {
        if(eventActive) return;
        eventActive = true;
        alertRift.style.display = 'block';
        setTimeout(() => { 
            alertRift.style.display = 'none';
            flipMaze(); // Primo switch immediato dopo allerta
            setInterval(flipMaze, 10000); // Poi ogni 10s
            eventActive = false;
        }, 3000);
    }

    function handleButtonClick() {
        overlay.style.display = 'none'; bgMusic.play(); path = [{x: 0, y: 0}]; generateMaze();
        setInterval(() => { if(currentLevel >= 6 && Math.random() > 0.6) triggerAsteroids(); }, 12000);
        setInterval(() => { if(currentLevel === 7 && !eventActive && Math.random() > 0.5) triggerRift(); }, 15000);
    }

    function winLevel() {
        isDragging = false;
        if (currentLevel < 7) { currentLevel++; overlay.style.display = 'flex'; } 
        else { showFinalWin(); }
    }

    function showFinalWin() {
        winScreen.style.display = 'flex';
        const c = document.getElementById('confetti-canvas');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const cctx = c.getContext('2d');
        let confs = Array.from({length:150}, () => ({ x: Math.random()*c.width, y: Math.random()*c.height, r: Math.random()*7+3, color: `hsl(${Math.random()*360}, 100%, 50%)`, s: Math.random()*4+2 }));
        function anim() {
            cctx.clearRect(0,0,c.width,c.height);
            confs.forEach(p => { p.y += p.s; if(p.y > c.height) p.y = -10; cctx.fillStyle = p.color; cctx.fillRect(p.x, p.y, p.r, p.r); });
            requestAnimationFrame(anim);
        }
        anim();
    }

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const gx = Math.floor((e.clientX - rect.left) / cellSize), gy = Math.floor((e.clientY - rect.top) / cellSize);
        if (path.length > 0 && gx === path[path.length-1].x && gy === path[path.length-1].y) isDragging = true;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        const gx = Math.floor((e.clientX - rect.left) / cellSize), gy = Math.floor((e.clientY - rect.top) / cellSize);
        const last = path[path.length - 1];
        if (gx < 0 || gx >= cols || gy < 0 || gy >= rows || maze[gy][gx] === 1) return;
        if (maze[gy][gx] === 2 || maze[gy][gx] === 4) { isDragging = false; if(currentLevel < 5) currentLevel = 1; overlay.style.display='flex'; return; }
        if (Math.abs(gx - last.x) + Math.abs(gy - last.y) === 1) {
            if (path.length > 1 && gx === path[path.length - 2].x && gy === path[path.length - 2].y) path.pop();
            else if (!path.some(p => p.x === gx && p.y === gy)) path.push({x: gx, y: gy});
            if (maze[gy][gx] === 3) { maze[gy][gx] = 0; keysFound++; }
            if (gx === cols - 1 && gy === rows - 1 && keysFound >= keysRequired) winLevel();
        }
    });

    window.addEventListener('mouseup', () => isDragging = false);
    generateMaze(); draw();
</script>
</body>
</html>
