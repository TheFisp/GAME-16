<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Space Maze XL - Glitch Sector</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; color: white; 
            font-family: 'Courier New', Courier, monospace;
        }
        #main-wrapper { display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; transition: transform 0.8s ease-in-out; }
        
        /* Effetto Glitch per Livello 7 */
        .glitch-active {
            animation: screenGlitch 0.2s infinite;
            filter: hue-rotate(90deg) contrast(1.5);
        }
        @keyframes screenGlitch {
            0% { clip-path: inset(1% 0 2% 0); transform: translate(2px, -2px); }
            20% { clip-path: inset(3% 0 1% 0); transform: translate(-2px, 2px); }
            40% { clip-path: inset(2% 0 3% 0); transform: translate(1px, 1px); }
            60% { clip-path: inset(1% 0 2% 0); transform: translate(-1px, -1px); }
            80% { clip-path: inset(4% 0 1% 0); transform: translate(2px, 2px); }
            100% { clip-path: inset(2% 0 2% 0); transform: translate(0, 0); }
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(15px); background: rgba(0,0,0,0.8); z-index: 100; text-align: center;
        }
        button {
            padding: 20px 60px; font-size: 1.8rem; background: #00ff41; border: none;
            color: black; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #00ff41; margin-top: 25px;
        }
        canvas { background: #000; border: 2px solid #333; display: block; }
        
        #alert-ui {
            position: fixed; top: 10%; width: 100%; text-align: center;
            color: #ff1a1a; font-size: 4rem; font-weight: 900; display: none; z-index: 50;
            animation: blink 0.5s infinite; text-shadow: 0 0 20px red;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        .shake-heavy { animation: shakeAnim 0.12s infinite; }
        @keyframes shakeAnim {
            0% { transform: translate(5px, 5px); }
            25% { transform: translate(-5px, -5px); }
            100% { transform: translate(0, 0); }
        }

        .flash-red { animation: flashBG 2.5s infinite ease-in-out; }
        @keyframes flashBG { 0%, 100% { background: #000; } 50% { background: #300; } }

        .mirror-mode { transform: scale(-1) !important; }
    </style>
</head>
<body>

<div id="alert-ui">ALLERTA ASTEROIDI</div>

<audio id="bgMusic" loop>
    <source src="https://raw.githubusercontent.com/TheFisp/GAME-16/main/YTDown.com_YouTube_Spore-Soundtrack-A-Million-Or-So-Nebula_Media_gniK6EF9EJM_007_128k.mp3" type="audio/mpeg">
</audio>
<audio id="sirenSound" loop><source src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3" type="audio/mpeg"></audio>

<div id="msg-overlay" class="overlay">
    <h1 id="msg-title" style="font-size: 3.5rem; letter-spacing: 5px;">SISTEMA AVVIATO</h1>
    <p id="msg-desc">I viola vibrano prima del salto. Occhio ai glitch nel finale.</p>
    <button onclick="handleButtonClick()">INIZIA</button>
</div>

<div id="main-wrapper">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('msg-overlay');
    const alertUI = document.getElementById('alert-ui');
    const wrapper = document.getElementById('main-wrapper');
    const bgMusic = document.getElementById('bgMusic');
    const siren = document.getElementById('sirenSound');

    let cellSize = 48, cols = 35, rows = 20;
    let currentLevel = 1, maze = [], path = [{x: 0, y: 0}];
    let isDragging = false, keysRequired = 0, keysFound = 0;
    let stars = [];
    let levelStartTime = 0;
    
    const TP_COOLDOWN = 7000;
    let lastTeleportTime = Date.now();

    function initStars() {
        stars = [];
        for(let i=0; i<100; i++) {
            stars.push({ x: Math.random()*2000, y: Math.random()*1500, s: Math.random()*2, o: Math.random() });
        }
    }

    function generateMaze() {
        keysFound = 0;
        levelStartTime = Date.now();
        wrapper.classList.remove('mirror-mode', 'glitch-active');
        
        if (currentLevel === 7) { cols = 45; rows = 25; cellSize = 38; }
        else { cols = 35; rows = 20; cellSize = 48; }
        canvas.width = cols * cellSize;
        canvas.height = rows * cellSize;
        initStars();

        const reqs = [0, 0, 0, 1, 2, 2, 3, 3];
        keysRequired = reqs[currentLevel];
        maze = Array.from({length: rows}, () => Array(cols).fill(0));
        
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if ((x<2 && y<2) || (x>cols-3 && y>rows-3)) continue;
                let r = Math.random();
                if (currentLevel === 1) { if(r > 0.85) maze[y][x] = 1; }
                else if (currentLevel === 2) { if(r > 0.95) maze[y][x] = 2; else if(r > 0.85) maze[y][x] = 1; }
                else if (currentLevel === 3) { if(r > 0.85) maze[y][x] = 1; }
                else if (currentLevel === 4) { if(r > 0.93) maze[y][x] = 2; else if(r > 0.85) maze[y][x] = 1; }
                else if (currentLevel === 5) { if(r > 0.95) maze[y][x] = 4; else if(r > 0.85) maze[y][x] = 1; }
                else if (currentLevel >= 6) { 
                    if(r > 0.96) maze[y][x] = 4; else if(r > 0.92) maze[y][x] = 2; else if(r > 0.85) maze[y][x] = 1; 
                }
            }
        }

        for (let i = 0; i < keysRequired; i++) {
            let rx, ry;
            do { rx = Math.floor(Math.random()*(cols-4))+2; ry = Math.floor(Math.random()*(rows-4))+2; }
            while (maze[ry][rx] !== 0);
            maze[ry][rx] = 3;
        }

        if (!isSolvable()) generateMaze();
        lastTeleportTime = Date.now();
    }

    function isSolvable() {
        let v = Array.from({length: rows}, () => Array(cols).fill(false));
        let q = [{x: 0, y: 0}]; v[0][0] = true;
        while(q.length > 0) {
            let {x, y} = q.shift();
            if(x === cols-1 && y === rows-1) return true;
            [[0,1],[1,0],[0,-1],[-1,0]].forEach(([dx, dy]) => {
                let nx = x+dx, ny = y+dy;
                if(nx>=0 && nx<cols && ny>=0 && ny<rows && maze[ny][nx] !== 1 && maze[ny][nx] !== 2 && maze[ny][nx] !== 4 && !v[ny][nx]) {
                    v[ny][nx] = true; q.push({x: nx, y: ny});
                }
            });
        }
        return false;
    }

    function draw() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Gestione Glitch Livello 7 dopo 20s
        if (currentLevel === 7 && (Date.now() - levelStartTime > 20000)) {
            wrapper.classList.add('mirror-mode', 'glitch-active');
        }

        // Stelle
        ctx.fillStyle = "white";
        stars.forEach(s => { ctx.globalAlpha = s.o; ctx.fillRect(s.x, s.y, s.s, s.s); });
        ctx.globalAlpha = 1;

        const now = Date.now();
        const elapsed = now - lastTeleportTime;
        const tpRatio = Math.min(elapsed / TP_COOLDOWN, 1);

        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                let px = x * cellSize, py = y * cellSize;
                
                if (maze[y][x] === 1) {
                    ctx.fillStyle = "#1e1e3f"; ctx.fillRect(px+2, py+2, cellSize-4, cellSize-4);
                } else if (maze[y][x] === 2) {
                    ctx.fillStyle = "#f00"; ctx.beginPath(); ctx.arc(px+cellSize/2, py+cellSize/2, cellSize/3, 0, Math.PI*2); ctx.fill();
                } else if (maze[y][x] === 3) {
                    ctx.shadowBlur = 15; ctx.shadowColor = "yellow"; ctx.fillStyle = "#ffd700";
                    ctx.fillRect(px+12, py+12, cellSize-24, cellSize-24); ctx.shadowBlur = 0;
                } else if (maze[y][x] === 4) {
                    // Shake anticipato e progressivo
                    let shakeIntensity = 0;
                    if (elapsed > 2000) {
                        // Inizia a vibrare dal 2° secondo, curva esponenziale
                        shakeIntensity = Math.pow((elapsed-2000)/5000, 2) * 15; 
                    }
                    let offX = (Math.random()-0.5) * shakeIntensity;
                    let offY = (Math.random()-0.5) * shakeIntensity;

                    ctx.fillStyle = "#a0f";
                    ctx.beginPath(); ctx.arc(px+cellSize/2 + offX, py+cellSize/2 + offY, cellSize/3, 0, Math.PI*2); ctx.fill();

                    ctx.strokeStyle = "white";
                    ctx.lineWidth = tpRatio * 12;
                    ctx.beginPath(); ctx.arc(px+cellSize/2, py+cellSize/2, cellSize/3 - ctx.lineWidth/2, 0, Math.PI*2);
                    ctx.stroke();
                }
            }
        }

        // Uscita
        ctx.strokeStyle = (keysFound >= keysRequired) ? "#0f4" : "#444";
        ctx.lineWidth = 4; ctx.strokeRect((cols-1)*cellSize+6, (rows-1)*cellSize+6, cellSize-12, cellSize-12);

        // Filo Verde
        ctx.beginPath(); ctx.lineWidth = 8; ctx.strokeStyle = "#0f4"; ctx.lineJoin = "round";
        ctx.moveTo(path[0].x * cellSize + cellSize/2, path[0].y * cellSize + cellSize/2);
        path.forEach(p => ctx.lineTo(p.x * cellSize + cellSize/2, p.y * cellSize + cellSize/2));
        ctx.stroke();

        // Alieno (disegnato DOPO il filo per stare sopra)
        if (path.length < 5) { // Lo lasciamo visibile per i primi passi
            ctx.font = "32px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("👽", 0 * cellSize + cellSize/2, 0 * cellSize + cellSize/2);
        }

        // Pallina Giocatore
        const last = path[path.length - 1];
        ctx.beginPath(); ctx.arc(last.x * cellSize + cellSize/2, last.y * cellSize + cellSize/2, 12, 0, Math.PI*2);
        ctx.fillStyle = "#fff"; ctx.fill(); ctx.stroke();

        if (elapsed >= TP_COOLDOWN) { teleportObstacles(); lastTeleportTime = Date.now(); }
        requestAnimationFrame(draw);
    }

    function teleportObstacles() {
        for(let y=0; y<rows; y++) {
            for(let x=0; x<cols; x++) {
                if(maze[y][x] === 4) {
                    maze[y][x] = 0;
                    let rx, ry;
                    do { rx = Math.floor(Math.random()*cols); ry = Math.floor(Math.random()*rows); }
                    while (maze[ry][rx] !== 0 || path.some(p => p.x === rx && p.y === ry));
                    maze[ry][rx] = 4;
                }
            }
        }
    }

    function triggerAsteroids() {
        alertUI.style.display = 'block';
        wrapper.classList.add('shake-heavy');
        document.body.classList.add('flash-red');
        siren.play();
        setTimeout(() => {
            alertUI.style.display = 'none';
            wrapper.classList.remove('shake-heavy');
            document.body.classList.remove('flash-red');
            siren.pause();
        }, Math.random()*3000 + 5000);
    }

    function handleButtonClick() {
        overlay.style.display = 'none';
        bgMusic.play();
        path = [{x: 0, y: 0}];
        generateMaze();
        
        if (currentLevel >= 6) {
            setInterval(() => { if(Math.random() > 0.7) triggerAsteroids(); }, 16000);
        }
    }

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        let ex = e.clientX, ey = e.clientY;
        if(wrapper.classList.contains('mirror-mode')) { ex = window.innerWidth - ex; ey = window.innerHeight - ey; }
        const gx = Math.floor((ex - rect.left) / cellSize), gy = Math.floor((ey - rect.top) / cellSize);
        if (gx === path[path.length-1].x && gy === path[path.length-1].y) isDragging = true;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        let ex = e.clientX, ey = e.clientY;
        if(wrapper.classList.contains('mirror-mode')) { ex = window.innerWidth - ex; ey = window.innerHeight - ey; }
        const gx = Math.floor((ex - rect.left) / cellSize), gy = Math.floor((ey - rect.top) / cellSize);
        const last = path[path.length - 1];

        if (gx < 0 || gx >= cols || gy < 0 || gy >= rows || maze[gy][gx] === 1) return;
        if (maze[gy][gx] === 2 || maze[gy][gx] === 4) { triggerReset(); return; }

        if (Math.abs(gx - last.x) + Math.abs(gy - last.y) === 1) {
            if (path.length > 1 && gx === path[path.length - 2].x && gy === path[path.length - 2].y) path.pop();
            else if (!path.some(p => p.x === gx && p.y === gy)) path.push({x: gx, y: gy});
            if (maze[gy][gx] === 3) { maze[gy][gx] = 0; keysFound++; }
            if (gx === cols - 1 && gy === rows - 1 && keysFound >= keysRequired) winLevel();
        }
    });

    function triggerReset() {
        isDragging = false;
        if (currentLevel < 5) currentLevel = 1;
        document.getElementById('msg-title').innerText = "NAVETTA DISTRUTTA";
        overlay.style.display = 'flex';
    }

    function winLevel() {
        isDragging = false;
        if (currentLevel < 7) {
            currentLevel++;
            document.getElementById('msg-title').innerText = "SETTORE SUPERATO";
            overlay.style.display = 'flex';
        } else {
            document.getElementById('msg-title').innerText = "DOMINATORE DELLO SPAZIO";
            overlay.style.display = 'flex';
        }
    }

    window.addEventListener('mouseup', () => isDragging = false);
    generateMaze();
    draw();
</script>
</body>
</html>
